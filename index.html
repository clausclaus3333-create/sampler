<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCHÜBEE SAMPLER</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }
    .kill {
      width: 100%;
      max-width: 900px;
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: red;
      color: white;
      margin-bottom: 18px;
      cursor: pointer;
    }
    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .pad {
      background: #222;
      border: 1px solid #444;
      border-radius: 14px;
      padding: 16px;
    }
    .pad h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    .file {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .pad button {
      width: 100%;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #1faa00;
      color: white;
      cursor: pointer;
    }
    .pad button.stop {
      background: #ff8800;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <h1>SCHÜBEE SAMPLER</h1>
  <button class="kill" onclick="killAll()">KILL SWITCH</button>
  <div class="grid" id="pads"></div>

  <script>
    const samples = [
      { title: "Jingle 1", file: "mp3/jingle1.mp3" },
      { title: "Jingle 2", file: "mp3/jingle2.mp3" },
      { title: "Jingle 3", file: "mp3/jingle3.mp3" },
      { title: "Jingle 4", file: "mp3/jingle4.mp3" },
      { title: "Jingle 5", file: "mp3/jingle5.mp3" },
      { title: "Jingle 6", file: "mp3/jingle6.mp3" },
      { title: "Jingle 7", file: "mp3/jingle7.mp3" },
      { title: "Jingle 8", file: "mp3/jingle8.mp3" },
      { title: "Jingle 9", file: "mp3/jingle9.mp3" },
      { title: "Jingle 10", file: "mp3/jingle10.mp3" }
    ];

    const pads = [];

    function createPads() {
      const container = document.getElementById("pads");

      samples.forEach((sample) => {
        const audio = new Audio(sample.file);
        audio.preload = "auto";
        audio.volume = 1;

        const pad = {
          audio,
          playing: false,
          button: null
        };

        const div = document.createElement("div");
        div.className = "pad";

        const title = document.createElement("h3");
        title.textContent = sample.title;

        const file = document.createElement("div");
        file.className = "file";
        file.textContent = sample.file;

        const btn = document.createElement("button");
        btn.textContent = "START";

        btn.onclick = async () => {
          if (!pad.playing) {
            try {
              audio.currentTime = 0;
              await audio.play();
              pad.playing = true;
              btn.textContent = "STOP";
              btn.classList.add("stop");
            } catch (e) {
              alert("Datei nicht gefunden oder kann nicht abgespielt werden: " + sample.file);
            }
          } else {
            audio.pause();
            audio.currentTime = 0;
            pad.playing = false;
            btn.textContent = "START";
            btn.classList.remove("stop");
          }
        };

        audio.onended = () => {
          pad.playing = false;
          btn.textContent = "START";
          btn.classList.remove("stop");
        };

        pad.button = btn;

        div.appendChild(title);
        div.appendChild(file);
        div.appendChild(btn);
        container.appendChild(div);

        pads.push(pad);
      });
    }

    function killAll() {
      pads.forEach((pad) => {
        pad.audio.pause();
        pad.audio.currentTime = 0;
        pad.playing = false;
        if (pad.button) {
          pad.button.textContent = "START";
          pad.button.classList.remove("stop");
        }
      });
    }

    createPads();
  </script>
</body>
</html>
